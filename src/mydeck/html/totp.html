<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOTP 2FA 登録</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #1a1a2e; color: #eee; }
    h1 { color: #0f9; }
    h2 { color: #adf; border-bottom: 1px solid #444; padding-bottom: 8px; }
    label { display: block; margin-top: 12px; font-size: 0.9em; color: #aaa; }
    input[type=text], input[type=file] { width: 100%; padding: 8px; background: #222; color: #eee; border: 1px solid #555; border-radius: 4px; box-sizing: border-box; margin-top: 4px; }
    button { margin-top: 14px; padding: 8px 18px; background: #0f9; color: #000; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    button.del { background: #f44; color: #fff; }
    button.move { background: #555; color: #fff; padding: 4px 8px; margin: 1px; font-size: 0.9em; min-width: 28px; }
    button.edit { background: #47a; color: #fff; padding: 3px 8px; font-size: 0.8em; }
    .editable { cursor: pointer; border-bottom: 1px dashed #666; }
    #status { margin-top: 10px; padding: 8px; border-radius: 4px; display: none; }
    .ok { background: #1a4; }
    .err { background: #a22; }
    table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    td, th { padding: 8px; border: 1px solid #444; text-align: left; vertical-align: middle; }
    th { background: #222; text-align: center; }
  </style>
</head>
<body>
  <h1>TOTP 2FA 登録</h1>

  <h2>カメラでQRコードをスキャン</h2>
  <div id="camera-section">
    <button id="camera-btn" onclick="toggleCamera()">カメラを起動</button>
    <div id="camera-container" style="display:none; margin-top:10px; position:relative;">
      <video id="camera-video" style="width:100%; border-radius:4px; background:#000;" autoplay playsinline></video>
      <div id="scan-overlay" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); border:2px solid #0f9; width:200px; height:200px; border-radius:8px; pointer-events:none;"></div>
    </div>
    <p id="camera-status" style="color:#666; font-size:0.85em;"></p>
  </div>

  <h2>QRコード画像からインポート</h2>
  <label>アカウント名（省略可: URIから自動取得）</label>
  <input type="text" id="upload-name" placeholder="例: GitHub">
  <label>QRコード画像</label>
  <input type="file" id="qr-file" accept="image/*">
  <button onclick="uploadQR()">QRコードを登録</button>

  <h2>URI / シークレットを直接入力</h2>
  <label>otpauth URI または Google Authenticator エクスポート URI</label>
  <input type="text" id="uri-input" placeholder="otpauth://totp/... または otpauth-migration://...">
  <p style="text-align:center;color:#666">— または —</p>
  <label>アカウント名</label>
  <input type="text" id="manual-name" placeholder="例: GitHub">
  <label>発行者（省略可）</label>
  <input type="text" id="manual-issuer" placeholder="例: GitHub">
  <label>シークレットキー（Base32）</label>
  <input type="text" id="manual-secret" placeholder="例: JBSWY3DPEHPK3PXP">
  <button onclick="registerManual()">登録</button>

  <div id="status"></div>

  <h2>登録済みアカウント</h2>
  <table id="accounts-table">
    <thead><tr><th>順番</th><th>アカウント名</th><th>発行者</th><th>画像</th><th>操作</th></tr></thead>
    <tbody id="accounts-body"></tbody>
  </table>

  <script>
    function showStatus(msg, ok) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = ok ? 'ok' : 'err';
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 4000);
    }

    async function uploadQR() {
      const file = document.getElementById('qr-file').files[0];
      if (!file) { showStatus('画像を選択してください', false); return; }
      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          const b64 = e.target.result.split(',')[1];
          const name = document.getElementById('upload-name').value.trim();
          const res = await fetch('/api/totp/upload', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image_b64: b64, name: name || undefined })
          });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          if (data.ok) { showStatus(`登録成功: ${data.name}`, true); loadAccounts(); document.getElementById('qr-file').value = ''; }
          else { showStatus(`エラー: ${data.error}`, false); }
        } catch (err) {
          showStatus(`エラー: ${err.message}`, false);
        }
      };
      reader.readAsDataURL(file);
    }

    async function registerManual() {
      const uri = document.getElementById('uri-input').value.trim();
      const name = document.getElementById('manual-name').value.trim();
      const issuer = document.getElementById('manual-issuer').value.trim();
      const secret = document.getElementById('manual-secret').value.trim();
      const body = uri ? { uri } : { name, issuer, secret };
      if (!uri && (!name || !secret)) {
        showStatus('アカウント名とシークレットは必須です', false); return;
      }
      try {
        const res = await fetch('/api/totp/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (data.ok) { showStatus(`登録成功: ${data.name}`, true); loadAccounts(); }
        else { showStatus(`エラー: ${data.error}`, false); }
      } catch (err) {
        showStatus(`エラー: ${err.message}`, false);
      }
    }

    async function deleteAccount(name) {
      if (!confirm(`"${name}" を削除しますか？`)) return;
      try {
        const res = await fetch('/api/totp/delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name })
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (data.ok) { showStatus(`削除しました: ${name}`, true); loadAccounts(); }
        else { showStatus(`エラー: ${data.error}`, false); }
      } catch (err) {
        showStatus(`エラー: ${err.message}`, false);
      }
    }

    async function loadAccounts() {
      try {
        const res = await fetch('/api/totp/accounts');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const accounts = await res.json();
        const tbody = document.getElementById('accounts-body');
        tbody.innerHTML = '';
        if (accounts.length === 0) {
          const tr = document.createElement('tr');
          const td = document.createElement('td');
          td.colSpan = 5;
          td.style.color = '#666';
          td.textContent = '登録済みアカウントはありません';
          tr.appendChild(td);
          tbody.appendChild(tr);
          return;
        }
        accounts.forEach((acc, idx) => {
          const tr = document.createElement('tr');
          // Order buttons
          const tdOrder = document.createElement('td');
          tdOrder.style.cssText = 'white-space:nowrap; vertical-align:middle;';
          const btnUp = document.createElement('button');
          btnUp.className = 'move';
          btnUp.textContent = '\u25B2';
          btnUp.disabled = idx === 0;
          btnUp.addEventListener('click', () => moveAccount(accounts, idx, -1));
          const btnDown = document.createElement('button');
          btnDown.className = 'move';
          btnDown.textContent = '\u25BC';
          btnDown.disabled = idx === accounts.length - 1;
          btnDown.addEventListener('click', () => moveAccount(accounts, idx, 1));
          tdOrder.appendChild(btnUp);
          tdOrder.appendChild(btnDown);
          // Name (click to edit)
          const tdName = document.createElement('td');
          tdName.textContent = acc.name;
          tdName.className = 'editable';
          tdName.style.verticalAlign = 'middle';
          tdName.title = 'クリックで編集';
          tdName.addEventListener('click', () => editField(acc.name, 'name', acc.name));
          // Issuer (click to edit)
          const tdIssuer = document.createElement('td');
          tdIssuer.textContent = acc.issuer || '';
          tdIssuer.className = 'editable';
          tdIssuer.style.verticalAlign = 'middle';
          tdIssuer.title = 'クリックで編集';
          tdIssuer.addEventListener('click', () => editField(acc.name, 'issuer', acc.issuer || ''));
          // Image
          const tdImage = document.createElement('td');
          const imgInput = document.createElement('input');
          imgInput.type = 'file';
          imgInput.accept = 'image/*';
          imgInput.style.cssText = 'width:250px; font-size:0.75em;';
          imgInput.addEventListener('change', () => uploadAccountImage(acc.name, imgInput));
          tdImage.appendChild(imgInput);
          const urlRow = document.createElement('div');
          urlRow.style.cssText = 'display:flex; gap:2px; margin-top:2px; align-items:center;';
          const urlInput = document.createElement('input');
          urlInput.type = 'text';
          urlInput.placeholder = 'URL';
          urlInput.style.cssText = 'width:100px; font-size:0.7em; padding:2px 4px;';
          const btnUrl = document.createElement('button');
          btnUrl.style.cssText = 'background:#47a; font-size:0.7em; padding:2px 6px; margin:0;';
          btnUrl.textContent = 'URL';
          btnUrl.addEventListener('click', () => setImageFromUrl(acc.name, urlInput.value.trim()));
          urlRow.appendChild(urlInput);
          urlRow.appendChild(btnUrl);
          const btnIcon = document.createElement('button');
          btnIcon.style.cssText = 'background:#36a; font-size:0.7em; padding:2px 6px; margin:0;';
          btnIcon.textContent = 'auto';
          btnIcon.addEventListener('click', () => fetchIcon(acc.name));
          urlRow.appendChild(btnIcon);
          if (acc.image) {
            const badge = document.createElement('span');
            badge.textContent = ' \u2713';
            badge.style.cssText = 'color:#0f9; font-weight:bold; margin-left:4px;';
            urlRow.appendChild(badge);
          }
          tdImage.appendChild(urlRow);
          // Delete
          const tdAction = document.createElement('td');
          tdAction.style.cssText = 'text-align:center; height:100%;';
          const actionWrap = document.createElement('div');
          actionWrap.style.cssText = 'display:flex; align-items:center; justify-content:center; height:100%; min-height:80px;';
          const btn = document.createElement('button');
          btn.className = 'del';
          btn.textContent = '削除';
          btn.addEventListener('click', () => deleteAccount(acc.name));
          actionWrap.appendChild(btn);
          tdAction.appendChild(actionWrap);
          tr.appendChild(tdOrder);
          tr.appendChild(tdName);
          tr.appendChild(tdIssuer);
          tr.appendChild(tdImage);
          tr.appendChild(tdAction);
          tbody.appendChild(tr);
        });
      } catch (err) {
        showStatus(`アカウント一覧の取得に失敗: ${err.message}`, false);
      }
    }

    async function setImageFromUrl(name, url) {
      if (!url) { showStatus('URLを入力してください', false); return; }
      try {
        const res = await fetch('/api/totp/set_image', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, image_url: url })
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (data.ok) { showStatus(`画像を設定しました: ${name}`, true); loadAccounts(); }
        else { showStatus(`エラー: ${data.error}`, false); }
      } catch (err) {
        showStatus(`エラー: ${err.message}`, false);
      }
    }

    async function editField(name, field, currentValue) {
      const label = field === 'name' ? 'アカウント名' : '発行者';
      const newValue = prompt(`${label}を入力:`, currentValue);
      if (newValue === null || newValue === currentValue) return;
      const body = { name };
      if (field === 'name') body.new_name = newValue;
      else body.new_issuer = newValue;
      try {
        const res = await fetch('/api/totp/update', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (data.ok) { showStatus(`更新しました`, true); loadAccounts(); }
        else { showStatus(`エラー: ${data.error}`, false); }
      } catch (err) {
        showStatus(`エラー: ${err.message}`, false);
      }
    }

    async function fetchIcon(name) {
      try {
        const res = await fetch('/api/totp/fetch_icon', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name })
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (data.ok) { showStatus(`アイコンを取得しました: ${name}`, true); loadAccounts(); }
        else { showStatus(`${data.error}`, false); }
      } catch (err) {
        showStatus(`エラー: ${err.message}`, false);
      }
    }

    async function moveAccount(accounts, idx, direction) {
      const newIdx = idx + direction;
      if (newIdx < 0 || newIdx >= accounts.length) return;
      const names = accounts.map(a => a.name);
      [names[idx], names[newIdx]] = [names[newIdx], names[idx]];
      try {
        const res = await fetch('/api/totp/reorder', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ names })
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        loadAccounts();
      } catch (err) {
        showStatus(`エラー: ${err.message}`, false);
      }
    }

    async function uploadAccountImage(name, input) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          const b64 = e.target.result.split(',')[1];
          const res = await fetch('/api/totp/set_image', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, image_b64: b64 })
          });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          if (data.ok) { showStatus(`画像を設定しました: ${name}`, true); loadAccounts(); }
          else { showStatus(`エラー: ${data.error}`, false); }
        } catch (err) {
          showStatus(`エラー: ${err.message}`, false);
        }
      };
      reader.readAsDataURL(file);
    }

    // --- Camera QR scanning ---
    let cameraStream = null;
    let scanInterval = null;
    let scanning = false;  // prevent overlapping scan requests

    async function toggleCamera() {
      const container = document.getElementById('camera-container');
      const btn = document.getElementById('camera-btn');
      const statusEl = document.getElementById('camera-status');

      if (cameraStream) {
        stopCamera();
        return;
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        cameraStream = stream;
        const video = document.getElementById('camera-video');
        video.srcObject = stream;
        container.style.display = 'block';
        btn.textContent = 'カメラを停止';

        // Try BarcodeDetector first (requires secure context: HTTPS or localhost)
        let useBarcodeDetector = false;
        if ('BarcodeDetector' in window) {
          try {
            const detector = new BarcodeDetector({ formats: ['qr_code'] });
            await detector.detect(new ImageData(1, 1));  // quick test
            useBarcodeDetector = true;
          } catch (e) { /* not available */ }
        }

        if (useBarcodeDetector) {
          statusEl.textContent = 'スキャン中（ブラウザ検出）... QRコードをカメラに映してください';
          const detector = new BarcodeDetector({ formats: ['qr_code'] });
          scanInterval = setInterval(async () => {
            if (video.readyState < 2 || scanning) return;
            try {
              const codes = await detector.detect(video);
              if (codes.length > 0) {
                await handleScannedQR(codes[0].rawValue);
              }
            } catch (e) { /* ignore */ }
          }, 300);
        } else {
          let scanCount = 0;
          statusEl.textContent = 'スキャン中（サーバー解析）... QRコードをカメラに映してください';
          const canvas = document.createElement('canvas');
          scanInterval = setInterval(async () => {
            if (video.readyState < 2 || scanning) return;
            scanning = true;
            scanCount++;
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const b64 = canvas.toDataURL('image/jpeg', 0.9).split(',')[1];
            try {
              const res = await fetch('/api/totp/scan', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image_b64: b64 })
              });
              const data = await res.json();
              statusEl.textContent = `スキャン中（サーバー解析）... 試行: ${scanCount}回` + (data.error ? ` エラー: ${data.error}` : '');
              if (data.uri) {
                await handleScannedQR(data.uri);
              }
            } catch (e) {
              statusEl.textContent = `スキャン中... 試行: ${scanCount}回 通信エラー: ${e.message}`;
            }
            scanning = false;
          }, 1500);
        }
      } catch (err) {
        statusEl.textContent = `カメラにアクセスできません: ${err.message}`;
      }
    }

    function stopCamera() {
      if (scanInterval) { clearInterval(scanInterval); scanInterval = null; }
      if (cameraStream) {
        cameraStream.getTracks().forEach(t => t.stop());
        cameraStream = null;
      }
      scanning = false;
      document.getElementById('camera-container').style.display = 'none';
      document.getElementById('camera-btn').textContent = 'カメラを起動';
      document.getElementById('camera-status').textContent = '';
    }

    async function handleScannedQR(qrData) {
      stopCamera();

      if (qrData.startsWith('otpauth-migration://') || qrData.startsWith('otpauth://')) {
        try {
          const res = await fetch('/api/totp/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ uri: qrData })
          });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          if (data.ok) {
            const msg = data.count
              ? `${data.count}件のアカウントを登録しました: ${data.name}`
              : `登録成功: ${data.name}`;
            showStatus(msg, true);
            loadAccounts();
          } else {
            showStatus(`エラー: ${data.error}`, false);
          }
        } catch (err) {
          showStatus(`エラー: ${err.message}`, false);
        }
      } else {
        showStatus(`認識できないQRコードです`, false);
      }
    }

    loadAccounts();
  </script>
</body>
</html>
